<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pop upss</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:80px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
margin:6px;
width:260px;
}
</style>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>

const APP_ID = "xxxxxxxxxxx" //enter your app id
const REST_KEY = "xxxxxxxxxx" //enter your rest key

window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

await OneSignal.init({
appId: APP_ID
});

/* vibrate when notification arrives while page open */
OneSignal.Notifications.addEventListener("foregroundWillDisplay", (event) => {

if (navigator.vibrate) {
navigator.vibrate([300,150,300]);
}

});

});

// user subscribe
function subscribeUser(){

OneSignalDeferred.push(async function(OneSignal) {

await OneSignal.Notifications.requestPermission();

});

}

// admin send notification
async function sendNotification(){

const title = document.getElementById("title").value
const message = document.getElementById("message").value

const response = await fetch("https://onesignal.com/api/v1/notifications",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Basic " + REST_KEY
},

body:JSON.stringify({
app_id: APP_ID,
included_segments:["All"],
headings:{en:title},
contents:{en:message},

/* redirect always to Times of India */
url:"https://timesofindia.indiatimes.com/",

/* vibration pattern */
chrome_web_vibrate:[300,150,300],

/* notification sound */
chrome_web_sound:"https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3"

})

})

const data = await response.json()

console.log(data)

alert("Notification chle gyi yrr ruk jao abbb muahh!")

}

</script>

</head>

<body>

<h2>User Section</h2>

<button onclick="subscribeUser()">Notifications enable kr looo</button>

<hr style="margin:40px">

<h2>Admin ka panel</h2>

<input id="title" placeholder="kya topic h huh?"><br>
<input id="message" placeholder="msg h huhh? type kr do code lang m"><br>

<button onclick="sendNotification()">pop up bhejo</button>

</body>
</html>
